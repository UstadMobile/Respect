# Admin login - Approves People and Class invites
# Admin in people page validating and approving join request
- clearState: world.respect.app
- runFlow: "subflows/school_admin_login_flow.yaml"
- assertVisible:
    id: "app_title"
    text: "Apps"
- tapOn: "People"
- assertVisible: "Pending request to join.*"
- repeat:
    times: 3
    while:
      visible: "Accept Invite"
    commands:
      - tapOn: "Accept Invite"
- assertVisible: "AdminA User"
- assertVisible: "TeacherA User"
- assertVisible: "TeacherC User"
- assertNotVisible: "Pending request to join.*"

# Invite Admin as new person - Approve Required Off
- tapOn:
    id: "ExpandableFab"   #  +Person button
- tapOn:
    text: "Invite person"
    index: 1
- assertVisible:
    id: "app_title"
    text: "Invite person"
- assertVisible:
    id: "app_title"
    text: "Invite person"
- tapOn:
    id: "role"
- tapOn:
    text: "System administrator"
- scroll
- runFlow:
    when:
      notVisible: "Approval not required until:.*"
    commands:
      - tapOn: "Approval required"
      - assertVisible: "Approval not required until:.*"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.adminApproveOff = maestro.copiedText}

# Invite Teacher as new person - Approve Required Off
- tapOn:
    id: "role"
- tapOn:
    text: "Teacher"
- runFlow:
    when:
      notVisible: "Approval not required until:.*"
    commands:
      - tapOn: "Approval required"
      - assertVisible: "Approval not required until:.*"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.teacherApproveOff = maestro.copiedText}
- back
- tapOn: "Classes"
- tapOn: "TestClass"
- assertNotVisible: "Pending requests.*"
- runFlow:
    when:
       notVisible: "TeacherC User"
    commands:
        - tapOn: "People"
        - assertVisible: "TeacherC User"
        - tapOn: "Classes"
        - tapOn: "TestClass"
- assertVisible: "TeacherC User"

# Invite Teacher as new teacher to TestClass - Approve Required Off
- tapOn: "Add Teacher"
- tapOn: "Invite person"
- assertVisible:
    id: "app_title"
    text: "Invite person"
- runFlow:
    when:
      notVisible: "Approval not required until:.*"
    commands:
      - tapOn: "Approval required"
      - assertVisible: "Approval not required until:.*"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.teacherClassApproveOff = maestro.copiedText}

