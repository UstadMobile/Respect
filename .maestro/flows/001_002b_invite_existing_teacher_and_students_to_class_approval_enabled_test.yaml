appId: world.respect.app
onFlowStart:
  - clearState: world.respect.app
  - runScript:
      file: "scripts/school_init.js"
      env:
        TESTCONTROLLER_URL: ${TESTCONTROLLER_URL}
        SCHOOL_ADMIN_PASSWORD: ${SCHOOL_ADMIN_PASSWORD}
        DIR_ADMIN_AUTH_HEADER: ${DIR_ADMIN_AUTH_HEADER}
        SCHOOL_URL: ${SCHOOL_URL}
        SCHOOL_NAME: ${SCHOOL_NAME}
        URL_SUBSTITUTION: ${URL_SUBSTITUTION}
        NAME: "001_002b_invite_existing_teacher_and_students_to_class_approval_enabled_test"

onFlowComplete:
  - runScript:
      file: "scripts/teardown.js"

---
#Admin add a users to the app and add a class named - TestClass
- runFlow: "subflows/school_admin_login_flow.yaml"

- assertVisible:
    id: "app_title"
    text: "Apps"
- runFlow:
    file: "subflows/user_add_class.yaml"
    env:
      CLASSNAME: "TestClass"

- runFlow:
    file: "subflows/add_person_to_app.yaml"
    env:
      FIRSTNAME: "ParentA"
      LASTNAME: "User"
      GENDER: "Female"
      ROLE: "Parent"
      USERNAME: "parentauser"
      PASSWORD: "test123"

- runFlow:
    file: "subflows/add_person_to_app.yaml"
    env:
      FIRSTNAME: "StudentA"
      LASTNAME: "User"
      GENDER: "Female"
      ROLE: "Student"
      USERNAME: "studentauser"
      PASSWORD: "test123"

- runFlow:
    file: "subflows/add_person_to_app.yaml"
    env:
      FIRSTNAME: "StudentB"
      LASTNAME: "User"
      GENDER: "Male"
      ROLE: "Student"
      USERNAME: "studentbuser"
      PASSWORD: "test123"

- runFlow:
    file: "subflows/add_person_to_app.yaml"
    env:
      FIRSTNAME: "TeacherA"
      LASTNAME: "User"
      GENDER: "Female"
      ROLE: "Teacher"
      USERNAME: "teacherauser"
      PASSWORD: "test123"

# Add StudentB User as family member of Parent A
- tapOn: "People"
- tapOn: "ParentA User"
- tapOn:
    id: "floating_action_button"   # Edit button
- assertVisible:
    id: "app_title"
    text: "Edit person"
- tapOn: "Family member"
- assertVisible: "StudentA User"
- tapOn: "StudentB User"
- tapOn: "Save"
- assertVisible: "StudentB User"
- assertVisible:
    id: "app_title"
    text: "ParentA User"

- tapOn: "Classes"
- tapOn: "TestClass"
- assertVisible:
    id: "app_title"
    text: "TestClass"
- tapOn: "Add Teacher"
- tapOn: "Invite person"
- assertVisible:
    id: "app_title"
    text: "Invite person"
- assertVisible: "Copy link"
- assertVisible: "Send link via SMS"
- assertVisible: "Send link via Email"
- assertVisible: "Share link"
# Approval ON
- assertVisible: "Approval required"
- assertNotVisible: "Approval not required until:.*"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.teacherApproveOn = maestro.copiedText}
- back
- back
- tapOn: "Classes"
- tapOn: "TestClass"
- tapOn: "Add Student"

# Invite student to class - Approval ON
- tapOn: "Invite person"
- assertVisible:
    id: "app_title"
    text: "Invite person"
- runFlow:
    when:
      visible: "Approval not required until:.*"
    commands:
      - tapOn: "Approval required" # turn the switch ON
      - assertNotVisible: "Approval not required until:.*"
- assertNotVisible: "Approval not required until:.*"
- tapOn: "Invite students directly"
- scroll
- assertVisible: "Reset code"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.studentApproveOn = maestro.copiedText}

# Invite Students via parents - Approval ON
- tapOn: "Invite via parents"
- runFlow:
    when:
      visible: "Approval not required until:.*"
    commands:
      - tapOn: "Approval required" # turn the switch ON
      - assertNotVisible: "Approval not required until:.*"
- assertNotVisible: "Approval not required until:.*"
- copyTextFrom:
    id: "invite_code"
- evalScript: ${output.parentApproveOn = maestro.copiedText}


# Teacher sign-up via invite link to the class as already logged-in user
- clearState: world.respect.app
- runFlow:
    file: "subflows/school_user_login_flow.yaml"
    env:
      USERNAME: "teacherauser"
      PASSWORD: "test123"
- assertVisible:
    id: "app_title"
    text: "Apps"
- tapOn:
    id: "user_account_icon"
- tapOn: "Enter invite code"
- assertVisible:
    id: "app_title"
    text: "Enter invite code"
- tapOn: "Invite code"
- inputText: ${output.teacherApproveOn}
- tapOn: "Next"
- assertVisible:
    id: "app_title"
    text: "Invitation"
- assertVisible: "Class name"
- assertVisible: "TestClass"
- assertVisible: "Role"
- assertVisible: "Teacher"
- assertVisible: "School name"
- assertVisible: ${output.SCHOOL_NAME}
- assertVisible: "School server URL"
- assertVisible: ${output.SCHOOL_URL}
- tapOn: "Accept invite"
- assertVisible:
    id: "app_title"
    text: "Accounts"
- assertVisible: "TeacherA User"
#- assertVisible: "Pending requests"
#- assertVisible: "TeacherA User: TestClass (Teacher)"
#- assertVisible: ".*Pending approval"

# StudentA User joining class using link to join the class
- runFlow:
    file: "subflows/openlink_flow.yaml"
    env:
      URL: ${output.SCHOOL_URL + "respect_school_link/AcceptInvite?inviteCode=" + output.studentApproveOn}
- assertVisible:
    id: "app_title"
    text: "Login"
- tapOn: "Username"
- inputText: "studentauser"
- tapOn: "Password"
- inputText: "test123"
- tapOn: "Login"
- runFlow:
    when:
      visible: "Save password for Respect?"
    file: "subflows/save_password_prompt_cancel.yaml"
- assertVisible:
    id: "app_title"
    text: "Invitation"
- assertVisible: "Class name"
- assertVisible: "TestClass"
- assertVisible: "Role"
- assertVisible: "Student"
- assertVisible: "School name"
- assertVisible: ${output.SCHOOL_NAME}
- assertVisible: "School server URL"
- assertVisible: ${output.SCHOOL_URL}
- tapOn: "Accept invite"
- assertVisible:
    id: "app_title"
    text: "Accounts"
- assertVisible: "StudentA User"
#- assertVisible: "Pending requests"
#- assertVisible: "StudentA User: TestClass (Student)"
#- assertVisible: ".*Pending approval"

# Parent user use the link to add StudentA User to class
- runFlow:
    file: "subflows/openlink_flow.yaml"
    env:
      URL: ${output.SCHOOL_URL + "respect_school_link/AcceptInvite?inviteCode=" + output.parentApproveOn}
- assertVisible:
    id: "app_title"
    text: "Login"
- tapOn: "Username"
- inputText: "parentauser"
- tapOn: "Password"
- inputText: "test123"
- tapOn: "Login"
- assertVisible:
    id: "app_title"
    text: "Invitation"
- tapOn: "Select child"
- tapOn: "StudentB User"
- assertVisible: "Class name"
- assertVisible: "TestClass"
- assertVisible: "Role"
- assertVisible: "Student"
- assertVisible: "School name"
- assertVisible: ${output.SCHOOL_NAME}
- assertVisible: "School server URL"
- assertVisible: ${output.SCHOOL_URL}
- tapOn: "Accept Invite"
- assertVisible:
    id: "app_title"
    text: "Accounts"
- assertVisible: "ParentA User"
#- assertVisible: "Pending requests"
#- assertVisible: "StudentB User: TestClass (Student)"
#- assertVisible: ".*Pending approval"
#- assertVisible: "Family members"
#- assertVisible: "StudentB User"

# Admin approve user's request to join the class
- clearState: world.respect.app
- runFlow: "subflows/school_admin_login_flow.yaml"
- tapOn: "Classes"
- tapOn: "TestClass"
- repeat:
    times: 3
    while:
      visible: "Accept Invite"
    commands:
      - tapOn: "Accept Invite"
- assertVisible: "TeacherA User"
- assertVisible: "StudentA User"
- assertVisible: "StudentB User"
- assertNotVisible: "Pending requests"