appId: world.respect.app
onFlowStart:
  - clearState: world.respect.app
  - runScript:
      file: "scripts/school_init.js"
      env:
        TESTCONTROLLER_URL: ${TESTCONTROLLER_URL}
        SCHOOL_ADMIN_PASSWORD: ${SCHOOL_ADMIN_PASSWORD}
        DIR_ADMIN_AUTH_HEADER: ${DIR_ADMIN_AUTH_HEADER}
        SCHOOL_URL: ${SCHOOL_URL}
        SCHOOL_NAME: ${SCHOOL_NAME}
        URL_SUBSTITUTION: ${URL_SUBSTITUTION}
        NAME: "002_browse_lessons_test"

onFlowComplete:
  - runScript:
      file: "scripts/teardown.js"
---
- runFlow: "subflows/school_admin_login_flow.yaml"
- assertVisible: "Home"
- assertVisible:
    id: "app_title"
    text: "Home"
- tapOn: "Apps"
- tapOn:
    id: "floating_action_button"  # +Add App
- tapOn: "Add from Link"
- tapOn: "Link*"
- inputText: ${output.SCHOOL_URL}static-resources/respect-ds/case_valid/appmanifest.json
- tapOn: "Next"
- assertVisible:
    id: "app_title"
    text: "App detail"
- assertVisible: "My app"
- assertVisible: "Add App"
# verify App got added to Apps section
- tapOn: "Add App"
- tapOn: "Home"
- assertVisible:
    id: "app_title"
    text: "Home"
- tapOn: "Bookmarks"
- assertVisible: "No bookmarks yet"
- assertVisible: "Bookmark a lesson or a playlist to see it here."
- tapOn: "Apps"
- tapOn: "My app"
- tapOn: "Grade 1"
- tapOn: "Lesson 001"
- assertVisible: "Lesson 001"
- assertVisible: "My App"
- tapOn: "Open"
- extendedWaitUntil:
    visible: "Lesson 001"
    timeout: 1000
- assertVisible: "Hello World Lesson"
- tapOn: "Close"
- assertVisible: "Download"
- assertVisible: "Assign"
- tapOn: "Bookmark"
- back
- assertVisible: "Lesson 002"
- tapOn: "Lesson 002"
- tapOn: "Bookmark"
- tapOn: "Home"
- tapOn: "Bookmarks"
- assertVisible: "Lesson 001"
- assertVisible: "Lesson 002"
- tapOn:
    text: "Bookmark"
    index: 0
#- assertVisible: "1 Remove Bookmark"
#- assertVisible: "Undo"
#- assertNotVisible: "Lesson 001"
#- tapOn: "Undo"
#- assertVisible: "Lesson 001"

- clearState: world.respect.app
- runFlow: "subflows/school_admin_login_flow.yaml"
- assertVisible: "Home"
- assertVisible:
    id: "app_title"
    text: "Home"
- tapOn: "Bookmarks"
- assertVisible: "Lesson 001"

