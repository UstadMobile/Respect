# Verify edit assignment is working
- tapOn:
    id: "floating_action_button"   #  Edit button
- assertVisible:
    id: "app_title"
    text: "Edit assignment"
- tapOn: "Assignment title*"
- runFlow:
    file: "subflows/erase_text.yaml"
    env:
      TEXT: "Homework 1"
- inputText: "HW - Week 1"
- tapOn: "Save"
- assertVisible: "HW - Week 1"