appId: world.respect.app

---
- tapOn: "People"
- assertVisible:
      id: "app_title"
      text: "People"
- tapOn:
      id: "ExpandableFab"   #  +Person button
- tapOn: "Add new person"
- assertVisible:
      id: "app_title"
      text: "Add person"
- tapOn: "First names*"
- inputText: ${FIRSTNAME}
- tapOn: "Last name*"
- inputText: ${LASTNAME}
- tapOn: "Gender*"
- tapOn: ${GENDER}
- tapOn:
      id: "role"
- tapOn: ${ROLE}
- tapOn: "Save"
- assertVisible:
      id: "app_title"
      text: ${FIRSTNAME} ${LASTNAME}
