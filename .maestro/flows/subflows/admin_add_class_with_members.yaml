appId: world.respect.app

---
#  Admin add new class
- tapOn: "Classes"
- assertVisible:
    id: "app_title"
    text: "Classes"
- tapOn:
    id: "floating_action_button"   #  +Class button
- assertVisible:
    id: "app_title"
    text: "Add class"
- tapOn: "Class name*"
- inputText: "New Class"
- tapOn: "Save"

- runFlow:
    file: "admin_add_new_student_to_class.yaml"
    env:
      FIRSTNAME: StudentA
      LASTNAME: User
- runFlow:
    file: "admin_add_new_student_to_class.yaml"
    env:
      FIRSTNAME: StudentB
      LASTNAME: User
- runFlow:
    file: "admin_add_new_student_to_class.yaml"
    env:
      FIRSTNAME: StudentC
      LASTNAME: User
- runFlow:
    file: "admin_add_new_student_to_class.yaml"
    env:
      FIRSTNAME: StudentD
      LASTNAME: User

- runFlow:
    file: "admin_add_new_teacher_to_class.yaml"
    env:
      FIRSTNAME: TeacherA
      LASTNAME: User

- runFlow:
    file: "create_account_for_class_member.yaml"
    env:
      CLASSNAME: "New Class"
      MEMBERNAME: TeacherA User
      MEMBERUSERNAME: teacherauser