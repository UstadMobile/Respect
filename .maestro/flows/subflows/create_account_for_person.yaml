appId: world.respect.app

---
- tapOn: "People"
- assertVisible:
      id: "app_title"
      text: "People"
- tapOn: ${FIRSTNAME} ${LASTNAME}
- assertVisible:
        id: "app_title"
        text: ${FIRSTNAME} ${LASTNAME}
- tapOn: "Create account"
- assertVisible:
        id: "app_title"
        text: "Create account"
- assertVisible:
        id: "Username"
        text: ${USERNAME}
- runFlow:
    when:
      visible: "Set password"
    commands:
      - tapOn: "Password*"
      - inputText: ${PASSWORD}
      - tapOn: "Save"
      - assertVisible:
          id: "password_change_btn"  # Change password button
- runFlow:
    when:
      visible: "Password"
    commands:
      - tapOn: "Password"
      - inputText: ${PASSWORD}
      - tapOn: "Save"
      - assertVisible: "Manage account"