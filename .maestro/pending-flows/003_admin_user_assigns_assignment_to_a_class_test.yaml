appId: world.respect.app
onFlowStart:
  - clearState: world.respect.app
  - runScript:
      file: "scripts/school_init.js"
      env:
        TESTCONTROLLER_URL: ${TESTCONTROLLER_URL}
        SCHOOL_ADMIN_PASSWORD: ${SCHOOL_ADMIN_PASSWORD}
        DIR_ADMIN_AUTH_HEADER: ${DIR_ADMIN_AUTH_HEADER}
        SCHOOL_URL: ${SCHOOL_URL}
        SCHOOL_NAME: ${SCHOOL_NAME}
        URL_SUBSTITUTION: ${URL_SUBSTITUTION}
        NAME: "003_admin_user_assigns_assignment_to_a_class_test"

onFlowComplete:
  - runScript:
      file: "scripts/teardown.js"
---
- runFlow: "subflows/school_admin_login_flow.yaml"
- runFlow: "subflows/admin_add_app.yaml"
- runFlow: "subflows/admin_add_class_with_members.yaml"

- runFlow:
    file: "subflows/school_admin_login_flow.yaml"
    env:
      SCHOOL_USERNAME: "teacherauser"
      SCHOOL_PASSWORD: "test1234"
- assertVisible: "Apps"
- tapOn: "Classes"
- assertVisible:
    id: "app_title"
    text: "Classes"
- assertVisible: "New Class"
- tapOn: "Assignments"
- tapOn:
    id: "floating_action_button"   #  +Assignment button
- assertVisible:
    id: "app_title"
    text: "Add assignment"
- tapOn: "Save"
- assertVisible: "Required field"
- tapOn: "Assignment name*"
- inputText: "Homework 1"
- tapOn: "Class"
- tapOn: "New Class"
- tapOn: "Description"
- inputText: "Hi Students, please complete this Homework on time."
- tapOn: "Date"
- runScript:
    file: "scripts/setDate.js"
- inputText: ${output.futureDate}
- tapOn: "Time"
- runScript:
    file: "scripts/setDate.js"
- inputText: ${output.currentTime}
- hideKeyboard
- tapOn: "Task"
- assertVisible:
    id: "app_title"
- tapOn: "My app"
- tapOn: "Grade 1"
- tapOn: "Lesson 001"
- tapOn: "Save"
- assertVisible:
    id: "app_title"
    text: "Homework 1"
- assertVisible: "All (4)"
- assertVisible: "Completed (0)"
- assertVisible: "In-progress (0)"
- assertVisible: "Not started (4)"
- assertVisible: "Hi Students, please complete this Homework on time."
- assertVisible: "Assigned to"
- assertVisible: "New Class"
- assertVisible: "StudentA User"
- assertVisible: "StudentB User"
- assertVisible: "StudentC User"
- assertVisible: "StudentD User"
- assertVisible: "Lesson 001"
- assertVisible: "Average"
- tapOn: "Assignments"
- assertVisible:
    id: "app_title"
    text: "Assignments"
- assertVisible: "All"
- assertVisible: "Pending (1)"
- assertVisible: "Completed (0)"
- assertVisible: "Homework 1"
- tapOn: "Completed (0)"
- assertNotVisible: "Homework 1"
- tapOn: "Pending (1)"
- assertVisible: "Homework 1"

- runFlow:
    file: "subflows/school_admin_login_flow.yaml"
    env:
      SCHOOL_USERNAME: "studentauser"
      SCHOOL_PASSWORD: "test1234"
- tapOn: "Assignments"
- tapOn: "Homework 1"
- assertVisible:
