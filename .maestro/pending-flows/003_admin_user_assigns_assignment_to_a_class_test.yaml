- assertVisible: "Hi Students, please complete this Homework on time."
- assertVisible: "Assigned to"
- assertVisible: "TestClass"
- assertVisible: "StudentA User"
- assertVisible: "StudentB User"
- assertVisible: "StudentC User"
- assertVisible: "StudentD User"
- assertVisible: "Lesson 001"
- assertVisible: "Average"
- tapOn: "Assignments"
- assertVisible:
    id: "app_title"
    text: "Assignments"
- assertVisible: "All"
- assertVisible: "Pending (1)"
- assertVisible: "Completed (0)"
- assertVisible: "Homework 1"
- tapOn: "Completed (0)"
- assertNotVisible: "Homework 1"
- tapOn: "Pending (1)"
- assertVisible: "Homework 1"

- clearState: world.respect.app
- runFlow:
    file: "subflows/school_user_login_flow.yaml"
    env:
      USERNAME: "studentauser"
      PASSWORD: "test1234"
- tapOn: "Assignments"
- tapOn: "Homework 1"
- assertVisible:
    id: "app_title"
    text: "Homework 1"
- tapOn: "Lesson 001"
- assertVisible:
    id: "app_title"
    text: "Homework 1"
- tapOn: "Open"
- extendedWaitUntil:
    visible: "Lesson 001"
    timeout: 1000
- assertVisible: "Hello World Lesson"
- tapOn: "Close"
- tapOn: "Assignments"
- assertVisible: "Homework 1"

